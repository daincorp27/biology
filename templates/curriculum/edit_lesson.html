{% extends "base.html" %}

{% block title %}Edit Lesson{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12 col-lg-8 offset-lg-2">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Edit Lesson: {{ lesson.title }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <!-- Title -->
                        <div class="form-group mb-3">
                            <label for="title">Lesson Title</label>
                            <input type="text" class="form-control" name="title" id="title" value="{{ lesson.title }}" required>
                        </div>

                        <!-- Description -->
                        <div class="form-group mb-3">
                            <label for="description">Short Description</label>
                            <input type="text" class="form-control" name="description" id="description" value="{{ lesson.description }}">
                        </div>

                        <!-- Rich Text Editor -->
                        <div class="form-group mb-3">
                            <label for="theory_text">Lesson Content</label>
                            <div id="editor" style="height: auto; min-height: 300px; background-color: white; border: 1px solid #ddd; border-radius: 4px;"></div>
                            <input type="hidden" id="theory_text" name="theory_text">
                        </div>

                        <!-- Lab Lesson Toggle -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="is_lab_lesson" id="is_lab_lesson" {% if lesson.is_lab_lesson %}checked{% endif %}>
                            <label class="form-check-label" for="is_lab_lesson">
                                Mark as Lab Lesson (Practical)
                            </label>
                        </div>

                        <!-- Order -->
                        <div class="form-group mb-3">
                            <label for="order">Order in Topic</label>
                            <input type="number" class="form-control" name="order" id="order" value="{{ lesson.order }}">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Update Lesson</button>
                            <a href="{{ url_for('course_detail', course_id=lesson.topic.module.course_id) }}" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                            <button type="button" class="btn btn-danger" onclick="deleteLesson({{ lesson.id }})"><i class="bi bi-trash"></i> Delete Lesson</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Quill.js Script -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>
  @media (max-width: 768px) {
    #editor {
      min-height: 250px !important;
    }
    
    .ql-toolbar {
      flex-wrap: wrap;
    }
  }
  
  @media (max-width: 480px) {
    #editor {
      min-height: 200px !important;
    }
    
    .ql-toolbar {
      padding: 5px;
    }
    
    .ql-container {
      font-size: 14px;
    }
  }
</style>

<script>
  var quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [{ 'header': 1 }, { 'header': 2 }],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'script': 'sub'}, { 'script': 'super' }],
        [{ 'indent': '-1'}, { 'indent': '+1' }],
        [{ 'size': ['small', false, 'large', 'huge'] }],
        [{ 'header': [false, 1, 2, 3, 4, 5, 6] }],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'align': [] }],
        ['clean'],
        ['link', 'image', 'video']
      ]
    }
  });

  // Handle drag and drop
  var editorDiv = document.querySelector('#editor');
  editorDiv.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    editorDiv.style.backgroundColor = '#f0f0f0';
  });

  editorDiv.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    editorDiv.style.backgroundColor = 'white';
  });

  editorDiv.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    editorDiv.style.backgroundColor = 'white';
    
    var files = e.dataTransfer.files;
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      if (file.type.startsWith('image/')) {
        uploadAndInsertFile(file, 'image');
      } else if (file.type.startsWith('video/')) {
        uploadAndInsertFile(file, 'video');
      }
    }
  });

  // Helper function to upload and insert files
  function uploadAndInsertFile(file, type) {
    var formData = new FormData();
    formData.append('file', file);
    
    fetch('/editor/upload', {
      method: 'POST',
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      if (data.error) {
        alert('Upload failed: ' + data.error);
        return;
      }
      if (data.location) {
        var range = quill.getSelection() || { index: quill.getLength() };
        quill.insertEmbed(range.index, type, data.location);
        if (type === 'image') {
          makeEditorImageResponsive(data.location);
        }
        quill.setSelection(range.index + 1);
      } else {
        alert('Upload failed: No location returned');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      alert('Error uploading ' + type + ': ' + error.message);
    });
  }

  function makeEditorImageResponsive(src) {
    setTimeout(() => {
      var img = quill.root.querySelector('img[src="' + src + '"]');
      if (img) {
        img.classList.add('responsive-quill-image');
        img.removeAttribute('width');
        img.removeAttribute('height');
      }
    }, 50);
  }

  quill.root.addEventListener('drop', (e) => {
    setTimeout(() => {
      const images = quill.root.querySelectorAll('img');
      images.forEach(img => {
        if (!img.dataset.resized) {
          img.classList.add('responsive-quill-image');
          img.removeAttribute('width');
          img.removeAttribute('height');
          img.dataset.resized = "true";
        }
      });
    }, 100);
  });

  // Load existing content
  quill.root.innerHTML = `{{ lesson.theory_text | safe }}`;

  // Handle image insertion
  quill.getModule('toolbar').addHandler('image', function() {
    var input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'image/*');
    input.onchange = function() {
      var file = this.files[0];
      if (file) {
        var formData = new FormData();
        formData.append('file', file);
        fetch('/editor/upload', {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            alert('Upload failed: ' + data.error);
            return;
          }
          if (data.location) {
            var range = quill.getSelection() || { index: quill.getLength() };
            quill.insertEmbed(range.index, 'image', data.location);
            makeEditorImageResponsive(data.location);
            quill.setSelection(range.index + 1);
          } else {
            alert('Upload failed: No location returned');
          }
        })
        .catch(error => {
          console.error('Error:', error);
          alert('Error uploading image: ' + error.message);
        });
      }
    };
    input.click();
  });

  // Handle video insertion
  quill.getModule('toolbar').addHandler('video', function() {
    var input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'video/*');
    input.onchange = function() {
      var file = this.files[0];
      if (file) {
        var formData = new FormData();
        formData.append('file', file);
        fetch('/editor/upload', {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          if (data.location) {
            var range = quill.getSelection();
            quill.insertEmbed(range.index, 'video', data.location);
            quill.setSelection(range.index + 1);
          } else {
            alert('Upload failed');
          }
        })
        .catch(error => {
          console.error('Error:', error);
          alert('Error uploading video');
        });
      }
    };
    input.click();
  });

  // Sync Quill content to hidden input before form submission
  var form = document.querySelector('form');
  form.onsubmit = function() {
    document.getElementById('theory_text').value = quill.root.innerHTML;
  };

  // Delete lesson with confirmation
  function deleteLesson(lessonId) {
    if (confirm('Are you sure you want to delete this lesson? This action cannot be undone.')) {
      var deleteForm = document.createElement('form');
      deleteForm.method = 'POST';
      deleteForm.action = '/teacher/lessons/' + lessonId + '/delete';
      document.body.appendChild(deleteForm);
      deleteForm.submit();
    }
  }
</script>
{% endblock %}
